<!DOCTYPE html>
<html lang="en">
<head>
    {% load static %}  <!-- Load the static template tag -->    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hyra MC</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>      
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f9f9f9;
            margin: 0;
            padding: 0;
        }

        .navbar {
            background-color: #f9f9f9;
            padding: 2px 10px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
        }

        .navbar a {
            float: right;
            color: black;
            text-align: center;
            padding: 10px 10px;
            text-decoration: none;
            transition: background-color 0.3s ease;
            position: sticky;
            border-radius: 15px;
        }

        .navbar a:hover {
            background-color: #f9f9f9;
            color: darkblue;
            border-radius: 20px;
        }

        .navbar a.active {
            background-color: #f9f9f9;
            color: white;
        }
        
        .navbar-menu {
            list-style: none;
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-grow: 1;
            margin: 0;
            padding: 0;
        }
        
        .navbar-menu a {
            color: black;
            text-decoration: none;
            padding: 10px 20px;
            font-size: 1.5rem; /* Adjust the font size here */
            transition: background-color 0.3s ease;
            line-height: 70px;  /* Match this to the height of the navbar or menu items */
        }

        .navbar-logo {
            display: flex;
            align-items: center; /* Vertically center logo */
            margin-right: auto;  /* Pushes the menu to the center */
        }

        /* Logo Styling */
        .navbar-logo img {
            height: 80px;  /* Adjust the height of the logo */
            width: auto;   /* The width will adjust proportionally */
            display: block;
        }

        /* Footer styling */
        footer {
            background-color: #333;
            color: #fff;
            padding: 20px 0;
            margin-top: 40px;
            width: 100%;
        }

        .footer-content {
            display: flex;
            justify-content: center;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .footer-info {
            display: flex;
            gap: 30px;
        }

        .footer-item {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .footer-item i {
            color: #f4a261;
            min-width: 20px;
            text-align: center;
        }

        .footer-copyright {
            margin-top: 15px;
            text-align: center;
            font-size: 0.9rem;
            color: #999;
            padding: 0 20px;
        }

        /* For mobile view */
        @media screen and (max-width: 768px) {
            .navbar {
                flex-direction: column;
                padding: 10px;
            }

            .navbar-logo {
                margin: 0 auto;
                padding: 10px 0;
            }

            .navbar-menu {
                flex-direction: column;
                width: 100%;
                gap: 5px;
                align-items: center;
            }

            .navbar-menu a {
                width: 100%;
                text-align: center;
                line-height: normal;
                padding: 15px 0;
                font-size: 1.2rem;
            }
            
            footer {
                padding: 20px 10px;
            }

            .footer-content {
                padding: 0 10px;
            }

            .footer-info {
                flex-direction: column;
                gap: 15px;
                width: 100%;
            }

            .footer-item {
                justify-content: flex-start;
                font-size: 0.9rem;
                padding: 5px 0;
            }

            .footer-item span {
                word-break: break-word;
            }

            .footer-copyright {
                margin-top: 20px;
                font-size: 0.8rem;
            }
            
        }

    </style>
</head>
<body>
    <!-- Navigation Menu -->
    <nav class="navbar">
    
        <a href="{% url 'home' %}" class="navbar-logo">
            <img src="{% static 'images/hyramc_logo_big.png' %}" alt="My Logo" class="logo"> <!-- Add your logo here -->
        </a>
            <ul class="navbar-menu">
            <a href="{% url 'home' %}">Hem</a>
            <a href="{% url 'create_booking' %}">Boka Motorcykel</a>
            <a href="{% url 'price' %}">Pris</a>
            <a href="{% url 'contact' %}">Kontakt</a>
        </ul>
        
    
    </nav>

    <!-- Content Block -->
    <div class="content">
        {% block content %}
        <!-- Page content goes here -->
        {% endblock %}
    </div>

    <!-- Footer -->
    <footer>
        <div class="footer-content">
            <div class="footer-info">
                <div class="footer-item">
                    <i class="fas fa-phone"></i>
                    <span>072-997 58 07</span>
                </div>
                <div class="footer-item">
                    <i class="fas fa-envelope"></i>
                    <span>info@mchyra.se</span>
                </div>
                <div class="footer-item">
                    <i class="fas fa-building"></i>
                    <span>Org.nr: 559321-6731</span>
                </div>
            </div>
        </div>
        <div class="footer-copyright">
            <p>&copy; 2024 MC Hyra. All rights reserved.</p>
        </div>
    </footer>

</body>
</html>
