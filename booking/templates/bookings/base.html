<!DOCTYPE html>
<html lang="en">
<head>
    {% load static %}  <!-- Load the static template tag -->    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hyra MC</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    
    <!-- Font Awesome (for icons) -->
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
    
    <style>      
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f9f9f9;
            margin: 0;
            padding: 0;
        }

        .navbar {
            background-color: #f9f9f9;
            overflow: hidden;
            font-family: 'Poppins', 'sans-serif';
            padding: 2px 0;
            justify-content: flex-start;  /* Logo on the left, menu on the right */
            display: flex;
        }

        .navbar a {
            float: right;
            display: inline-block;
            color: black;
            text-align: center;
            padding: 10px 10px;
            text-decoration: none;
            transition: background-color 0.3s ease;
            position: sticky;
            border-radius: 15px;
        }

        .navbar a:hover {
            background-color: #f9f9f9;
            color: darkblue;
            border-radius: 20px;
        }

        .navbar a.active {
            background-color: #f9f9f9;
            color: white;
        }
        
        .navbar-menu {
            list-style: none;
            display: flex;
            justify-content: center;  /* Center the menu items */
            gap: 20px;
            flex-grow: 1;  /* This ensures the menu grows and takes up available space */
        }
        
        .navbar-menu a {
            color: black;
            text-decoration: none;
            padding: 10px 20px;
            font-size: 1.5rem; /* Adjust the font size here */
            transition: background-color 0.3s ease;
            line-height: 70px;  /* Match this to the height of the navbar or menu items */
        }

        .navbar-logo {
            display: flex;
            align-items: center; /* Vertically center logo */
            margin-right: auto;  /* Pushes the menu to the center */
        }

        /* Logo Styling */
        .navbar-logo img {
            height: 80px;  /* Adjust the height of the logo */
            width: auto;   /* The width will adjust proportionally */
            display: block;
        }

        /* For mobile view */
        @media screen and (max-width: 768px) {
            .navbar a {
                float: none;
                display: block;
                text-align: left;
            }
        }

    </style>
</head>
<body>
    <!-- Navigation Menu -->
    <nav class="navbar">
    
        <a href="{% url 'home' %}" class="navbar-logo">
            <img src="{% static 'images/hyramc_logo_big.png' %}" alt="My Logo" class="logo"> <!-- Add your logo here -->
        </a>
            <ul class="navbar-menu">
            <a href="{% url 'home' %}">Hem</a>
            <a href="{% url 'create_booking' %}">Boka Motorcykel</a>
            <a href="{% url 'price' %}">Pris</a>
            <a href="{% url 'contact' %}">Kontakt</a>
        </ul>
        
    
    </nav>

    <!-- Content Block -->
    <div class="content">
        {% block content %}
        <!-- Page content goes here -->
        {% endblock %}
    </div>

    <!-- Footer -->
    <footer>
        <p>&copy; 2024 Motorcycle Rentals. All rights reserved.</p>
    </footer>

</body>
</html>
