<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hyra MC</title>
    <style>
        /* Basic CSS for the menu */
        .navbar {
            background-color: #333;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }

        .navbar a {
            float: right;
            display: block;
            color: white;
            text-align: center;
            padding: 14px 20px;
            text-decoration: none;
            transition: background-color 0.3s ease;
        }

        .navbar a:hover {
            background-color: #ddd;
            color: black;
        }

        .navbar a.active {
            background-color: #007bff;
            color: white;
        }
        
        /* For mobile view */
        @media screen and (max-width: 768px) {
            .navbar a {
                float: none;
                display: block;
                text-align: left;
            }
        }

    </style>
</head>
<body>
    <!-- Navigation Menu -->
    <div class="navbar">
        <a href="{% url 'contact' %}">Kontakt</a>
        <a href="{% url 'price' %}">Pris</a>
        <a href="{% url 'create_booking' %}">Boka Motorcykel</a>
        <a href="{% url 'home' %}">Hem</a>
    </div>

    <!-- Content Block -->
    <div class="content">
        {% block content %}
        <!-- Page content goes here -->
        {% endblock %}
    </div>

    <!-- Footer -->
    <footer>
        <p>&copy; 2024 Motorcycle Rentals. All rights reserved.</p>
    </footer>

</body>
</html>
