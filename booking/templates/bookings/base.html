<!DOCTYPE html>
<html lang="en">
<head>
    {% load static %}  <!-- Load the static template tag -->
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hyra MC</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    
    <!-- Font Awesome (for icons) -->
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
    
    <style>      
        /* Basic CSS for the menu */
        .navbar {
            background-color: #f9f9f9;
            overflow: hidden;
            font-family: 'Poppins', 'sans-serif';
            padding: 5px 0;
            justify-content: space-between;  /* Logo on the left, menu on the right */
            display: flex;
        }

        .navbar a {
            float: right;
            display: inline-block;
            color: black;
            text-align: center;
            padding: 20px 30px;
            text-decoration: none;
            transition: background-color 0.6s ease;
            position: sticky;
            border-radius: 25px;
        }

        .navbar a:hover {
            background-color: #ddd;
            color: darkblue;
            border-radius: 25px;
        }

        .navbar a.active {
            background-color: #007bff;
            color: white;
        }
        
        .navbar-menu a {
            color: black;
            text-decoration: none;
            padding: 10px 15px;
            font-size: 2rem; /* Adjust the font size here */
            transition: background-color 0.3s ease;
        }

        .navbar-logo {
            display: flex;
            align-items: center; /* Vertically center logo */
        }

        /* Logo Styling */
        .navbar-logo img {
            height: 70px;  /* Adjust the height of the logo */
            width: auto;   /* The width will adjust proportionally */
            display: block;
        }

        /* For mobile view */
        @media screen and (max-width: 768px) {
            .navbar a {
                float: none;
                display: block;
                text-align: left;
            }
        }

    </style>
</head>
<body>
    <!-- Navigation Menu -->
    <nav class="navbar">
    
        <a href="{% url 'home' %}" class="navbar-logo">
            <img src="{% static 'images/hyramc_logo.png' %}" alt="My Logo" class="logo"> <!-- Add your logo here -->
        </a>
            <ul class="navbar-menu">
            <a href="{% url 'contact' %}">Kontakt</a>
            <a href="{% url 'price' %}">Pris</a>
            <a href="{% url 'create_booking' %}">Boka Motorcykel</a>
            <a href="{% url 'home' %}">Hem</a>
        </ul>
        
    
    </nav>

    <!-- Content Block -->
    <div class="content">
        {% block content %}
        <!-- Page content goes here -->
        {% endblock %}
    </div>

    <!-- Footer -->
    <footer>
        <p>&copy; 2024 Motorcycle Rentals. All rights reserved.</p>
    </footer>

</body>
</html>
